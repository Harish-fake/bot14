services:
  - type: web
    name: gitsync-bot
    env: python
    buildCommand: pip install -r requirements.txt
    startCommand: python bot.py
    healthCheckPath: /health
    envVars:
      - key: BOT_TOKEN
        sync: false
      - key: ADMIN_IDS
        value: ""
      - key: DATABASE_PATH
        value: database/bot.db
      - key: LOG_LEVEL
        value: INFO
